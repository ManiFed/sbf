<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SBFTX·AI — Counsel Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0c0b07;
    }

    body {
      font-family: "Inter", ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #root {
      /* Lift contrast/brightness and scale slightly so dense terminal text is easier to read. */
      filter: contrast(1.16) brightness(1.14) saturate(1.05);
      transform: scale(1.03);
      transform-origin: top left;
      width: calc(100% / 1.03);
      height: calc(100% / 1.03);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="canned.jsx"></script>
  <script type="text/babel" src="portrait.jsx"></script>
  <script type="text/babel" src="variant-ledger.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<VariantLedger />);
  </script>
</body>
</html>
