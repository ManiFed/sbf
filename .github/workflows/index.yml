name: Update source index

on:
  push:
    paths:
      - "legal/**"
      - "media/**"
      - "misc/**"
      - "scripts/**"
      - "requirements.txt"
  workflow_dispatch:

concurrency:
  group: source-index
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate source index
        run: |
          python scripts/index_files.py
          python scripts/enrich_index.py
          python scripts/smart_titles.py
          python scripts/extract_text.py

      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update index + extracted text"
          file_pattern: source_index.csv processed/text/**
